worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 55M;

    # -------------------------------------------------------------------------
    # Headers de segurança
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains' always;
    add_header X-Content-Type-Options    'nosniff' always;
    add_header X-Frame-Options           'DENY' always;
    add_header Referrer-Policy           'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy        'camera=(), microphone=(), geolocation=()' always;

    # unsafe-eval removido — Next.js em produção não precisa
    # MinIO agora é acessado via /minio/ (proxy interno), sem expor porta 9000
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; media-src 'self' blob:; frame-src 'self' blob:;" always;

    # -------------------------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------------------------
    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 32; }
    upstream minio    { server minio:9000;    keepalive 8;  }

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------------------------------
        # MinIO — proxy interno (porta 9000 não fica mais exposta ao browser)
        # -----------------------------------------------------------------------
        location /minio/ {
            proxy_pass         http://minio/;
            proxy_http_version 1.1;
            proxy_set_header   Host              minio:9000;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
            # Permite upload de arquivos grandes
            client_max_body_size 55M;
        }

        # -----------------------------------------------------------------------
        # API REST → Django backend
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # -----------------------------------------------------------------------
        # WebSocket → Django Channels
        # -----------------------------------------------------------------------
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "Upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        # -----------------------------------------------------------------------
        # Admin Django
        # -----------------------------------------------------------------------
        location /admin/ {
            proxy_pass       http://backend;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # -----------------------------------------------------------------------
        # Arquivos estáticos Django
        # -----------------------------------------------------------------------
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # -----------------------------------------------------------------------
        # Frontend Next.js (catch-all)
        # -----------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "Upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
