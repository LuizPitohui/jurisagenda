# =============================================================================
# JurisAgenda — Docker Compose
# Spec seção 2.2 / 6.1: todos os contêineres definidos aqui.
# =============================================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: ./backend/.env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
  volumes:
    - ./backend:/app
  networks:
    - jurisagenda_net

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: jurisagenda_db
    environment:
      POSTGRES_DB: ${DB_NAME:-jurisagenda}
      POSTGRES_USER: ${DB_USER:-jurisagenda_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jurisagenda_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jurisagenda_user} -d ${DB_NAME:-jurisagenda}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jurisagenda_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - jurisagenda_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: jurisagenda_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - jurisagenda_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cria o bucket no startup
  minio_init:
    image: minio/mc:latest
    container_name: jurisagenda_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-jurisagenda-docs};
      mc anonymous set none local/${MINIO_BUCKET:-jurisagenda-docs};
      echo 'Bucket configurado.';
      "
    networks:
      - jurisagenda_net

  # ---------------------------------------------------------------------------
  # Backend Django (Gunicorn + Uvicorn ASGI)
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend-common
    container_name: jurisagenda_backend
    command: >
      sh -c "python manage.py migrate --noinput &&
      gunicorn core.asgi:application --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 120"
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery:
    <<: *backend-common
    container_name: jurisagenda_celery
    command: celery -A core worker -l info -c 4 -Q default,followup,documents,tv

  # ---------------------------------------------------------------------------
  # Celery Beat (agendador)
  # ---------------------------------------------------------------------------
  celerybeat:
    <<: *backend-common
    container_name: jurisagenda_celerybeat
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ---------------------------------------------------------------------------
  # Frontend Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./jurisagenda-frontend
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1/
        NEXT_PUBLIC_WS_URL: ""
        NEXT_PUBLIC_APP_NAME: JurisAgenda
        BACKEND_URL: http://nginx
    container_name: jurisagenda_frontend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://nginx
    ports:
      - "3000:3000"
    networks:
      - jurisagenda_net
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: jurisagenda_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/staticfiles:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - jurisagenda_net
    depends_on:
      - backend
      - frontend

# ---------------------------------------------------------------------------
# Volumes e Networks
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:

networks:
  jurisagenda_net:
    driver: bridge
